name: CI

on:
  workflow_dispatch:
  push:
    branches:
      - master
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (${{ matrix.os }}, Emacs ${{ matrix.emacs-version }})
    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.experimental }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        emacs-version: [30.1]
        experimental: [false]
        include:
          - os: ubuntu-latest
            emacs-version: snapshot
            experimental: true
          - os: macos-latest
            emacs-version: snapshot
            experimental: true
          - os: windows-latest
            emacs-version: snapshot
            experimental: true

    steps:
      - uses: actions/checkout@v5

      - uses: jcs090218/setup-emacs@master
        with:
          version: ${{ matrix.emacs-version }}

      - uses: emacs-eask/setup-eask@master
        with:
          version: 'snapshot'

      - name: Install dependencies
        run: eask install-deps --dev

      - name: Byte-compile (warnings are errors)
        run: make compile

      - name: Run full test suite
        run: make test-all

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: jcs090218/setup-emacs@master
        with:
          version: 30.1

      - uses: emacs-eask/setup-eask@master
        with:
          version: 'snapshot'

      - name: Install dependencies
        run: eask install-deps --dev

      - name: package-lint
        run: eask lint package

      - name: checkdoc
        run: eask lint checkdoc

      - name: elisp-lint
        run: make lint

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v5

      - uses: jcs090218/setup-emacs@master
        with:
          version: 30.1

      - uses: emacs-eask/setup-eask@master
        with:
          version: 'snapshot'

      - name: Install dependencies
        run: eask install-deps --dev

      - name: Generate coverage report
        run: make coverage

      - name: Upload to Coveralls
        uses: coverallsapp/github-action@v2
        with:
          file: .coverage/coveralls.json
          format: coveralls
